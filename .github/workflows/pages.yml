name: Deploy to GitHub Pages

# Publishes the built app to the gh-pages branch; GitHub Pages serves it
# at https://omarfx8181-beep.github.io/rt-pay-auditor/. (The Pages-
# artifact flow needs the site pre-created in Settings, which the
# workflow token can't do — the branch flow auto-enables it.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      - run: npm test
      # Flow tests over the production build — a failed flow blocks deploy.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build
        env:
          VITE_BASE: /rt-pay-auditor/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
